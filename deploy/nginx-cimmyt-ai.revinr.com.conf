# Manual nginx site for cimmyt-ai.revinr.com
# Backend (PM2 uvicorn): 127.0.0.1:9603
# Frontend (PM2 serve):  127.0.0.1:9604
#
# Install on VPS:
#   sudo cp deploy/nginx-cimmyt-ai.revinr.com.conf /etc/nginx/sites-available/cimmyt-ai.revinr.com
#   sudo ln -sf /etc/nginx/sites-available/cimmyt-ai.revinr.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d cimmyt-ai.revinr.com

server {
    listen 80;
    listen [::]:80;
    server_name cimmyt-ai.revinr.com;

    client_max_body_size 25m;

    # API → FastAPI (strip /api prefix, same as Vite proxy)
    location /api/ {
        proxy_pass http://127.0.0.1:9603/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Twilio / direct backend webhooks (no /api prefix)
    location /telephony/ {
        proxy_pass http://127.0.0.1:9603/telephony/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # FastAPI docs (optional)
    location /docs {
        proxy_pass http://127.0.0.1:9603/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:9603/openapi.json;
        proxy_set_header Host $host;
    }

    # Frontend → PM2 serve on 9604
    location / {
        proxy_pass http://127.0.0.1:9604;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
