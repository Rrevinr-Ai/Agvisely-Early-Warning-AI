name: Deploy

# 1) Build & push Docker images to GHCR
# 2) SSH into VPS and pull / restart containers
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_PATH: /opt/agvisely

jobs:
  deploy:
    name: Build & push images
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    outputs:
      backend_image: ${{ steps.names.outputs.backend }}
      frontend_image: ${{ steps.names.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Lowercase image names (GHCR requires lowercase)
        id: names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BACKEND="${{ env.REGISTRY }}/${OWNER}/${REPO}-backend"
          FRONTEND="${{ env.REGISTRY }}/${OWNER}/${REPO}-frontend"
          echo "BACKEND_IMAGE=${BACKEND}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${FRONTEND}" >> "$GITHUB_ENV"
          echo "backend=${BACKEND}" >> "$GITHUB_OUTPUT"
          echo "frontend=${FRONTEND}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  restart-server:
    name: Deploy to VPS
    needs: deploy
    runs-on: ubuntu-latest
    # Set repo variable ENABLE_VPS_DEPLOY=true after secrets are added
    if: ${{ vars.ENABLE_VPS_DEPLOY == 'true' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export BACKEND_IMAGE="${{ needs.deploy.outputs.backend_image }}:latest"
            export FRONTEND_IMAGE="${{ needs.deploy.outputs.frontend_image }}:latest"

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "Deploy finished."
            docker compose ps
